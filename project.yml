name: TurtleNeck
options:
  bundleIdPrefix: com.turtleneck
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

targets:
  TurtleNeck:
    type: application
    platform: macOS
    sources:
      - TurtleNeck
    info:
      path: TurtleNeck/Info.plist
      properties:
        NSCameraUsageDescription: "거북목 자세를 감지하기 위해 카메라를 사용합니다. 영상은 로컬에서만 처리되며 저장되지 않습니다."
        LSUIElement: true
    entitlements:
      path: TurtleNeck/TurtleNeck.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.turtleneck.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
schemes:
  TurtleNeck:
    build:
      targets:
        TurtleNeck: all
    run:
      config: Debug
